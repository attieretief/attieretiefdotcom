<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing — Attie Retief</title>
<meta name="description" content="Creative writing by Attie Retief — poetry, short stories, essays, and plays, in Afrikaans and English.">
<link rel="canonical" href="https://attieretief.com/writing/">
<link rel="stylesheet" href="/writing/book.css">
</head>
<body>
<header class="topbar">
<a href="/"><span class="dot"></span><span>Attie Retief</span></a>
<span class="section">/ <a href="/writing/">Writing</a></span>
</header>
<main class="page">

<div class="frontispiece" id="frontispiece">
<h1>Writing</h1>
<p class="intro" id="intro"></p>
<div class="frontis-author">Attie Retief</div>
<span class="ornament">❧</span>
</div>

<div id="view"></div>

<footer>&copy; 2026 Attie Retief</footer>
</main>

<script src="/writing/works.js"></script>
<script>
(function () {
  var W = window.WRITING || { languages: [] };
  var AUTHOR = "Attie Retief";
  var CLOTH = ["#5b6b5a","#7c3b34","#9a7d3b","#3f5468","#5e4a63","#3d5c4a",
    "#2f4858","#a35a3a","#4a4a52","#6b5d4f","#564a6b","#7a4a4a","#3a6b63"];

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c];
    });
  }
  function plural(n, one, many) { return n + " " + (n === 1 ? one : many); }
  function poemWord(lang, n) {
    return lang === "Afrikaans" ? plural(n, "gedig", "gedigte") : plural(n, "poem", "poems");
  }
  function collWord(lang, n) {
    return lang === "Afrikaans" ? plural(n, "versameling", "versamelings")
                                : plural(n, "collection", "collections");
  }

  // ── index the data + colour each collection by global order ──
  var langs = W.languages || [], langBySlug = {}, collByPath = {}, ci = 0;
  langs.forEach(function (L) {
    langBySlug[L.slug] = L;
    (L.genres || []).forEach(function (G) {
      G.bySlug = {};
      (G.collections || []).forEach(function (c) {
        c.color = CLOTH[ci++ % CLOTH.length];
        c.lang = L.label; c.genre = G.name;
        G.bySlug[c.slug] = c; collByPath[c.path] = c;
      });
    });
  });
  function genreOf(L, slug) { return (L.genres || []).filter(function (g) { return g.slug === slug; })[0]; }
  function collsOfLang(L) {
    return (L.genres || []).reduce(function (a, g) { return a.concat(g.collections || []); }, []);
  }
  function poemsIn(colls) { return colls.reduce(function (n, c) { return n + c.works.length; }, 0); }

  var frontis = document.getElementById("frontispiece");
  var view = document.getElementById("view");
  document.getElementById("intro").textContent = W.intro || "";

  function trail(parts) {
    // parts: [{label, href}] — last is current (no href)
    return '<nav class="trail">' + parts.map(function (p, i) {
      var seg = p.href ? '<a href="' + p.href + '">' + esc(p.label) + "</a>"
                       : '<span class="here">' + esc(p.label) + "</span>";
      return (i ? '<span class="sep">›</span>' : "") + seg;
    }).join("") + "</nav>";
  }

  // ── level 1: languages ──
  function showLanguages() {
    frontis.style.display = "";
    view.innerHTML = '<div class="picker">' + langs.map(function (L) {
      var colls = collsOfLang(L);
      return '<a class="pick" href="#/' + L.slug + '"><span class="pick-name">' + esc(L.label) +
        '</span><span class="pick-sub">' + esc(poemWord(L.label, poemsIn(colls))) + "</span></a>";
    }).join("") + "</div>";
  }

  // ── level 2: genres within a language ──
  function showGenres(L) {
    frontis.style.display = "none";
    var picks = (L.genres || []).map(function (G) {
      return '<a class="pick" href="#/' + L.slug + "/" + G.slug + '"><span class="pick-name">' +
        esc(G.name) + '</span><span class="pick-sub">' +
        esc(collWord(L.label, G.collections.length)) + " · " +
        esc(poemWord(L.label, poemsIn(G.collections))) + "</span></a>";
    }).join("");
    view.innerHTML =
      trail([{ label: "Writing", href: "#/" }, { label: L.label }]) +
      '<div class="level-head"><h2>' + esc(L.label) + "</h2></div>" +
      '<div class="picker">' + picks + "</div>";
  }

  // ── level 3: the shelf of collections for a language + genre ──
  function showShelf(L, G) {
    frontis.style.display = "none";
    var books = G.collections.map(function (c) {
      return '<a class="book" style="--cloth:' + c.color + '" href="#/' + c.path + '">' +
        '<span class="spine"></span><span class="sheen"></span>' +
        '<span class="book-inner"><span class="book-title">' + esc(c.theme) + '</span>' +
        '<span class="book-line"></span><span class="book-author">' + esc(AUTHOR) + "</span></span>" +
        '<span class="book-count">' + esc(poemWord(L.label, c.works.length)) + "</span></a>";
    }).join("");
    view.innerHTML =
      trail([{ label: "Writing", href: "#/" }, { label: L.label, href: "#/" + L.slug }, { label: G.name }]) +
      '<div class="level-head"><h2>' + esc(G.name) + '</h2><div class="sub">' + esc(L.label) + "</div></div>" +
      '<div class="shelf">' + books + "</div>";
  }

  // ── level 4: one collection, its poems ──
  function showCollection(c) {
    frontis.style.display = "none";
    var af = c.lang === "Afrikaans";
    var items = c.works.map(function (w, i) {
      return '<li><a href="' + esc(w.href) + '"><span class="num">' + (i + 1) + "</span>" +
        esc(w.title) + "</a></li>";
    }).join("");
    var L = langBySlug[c.path.split("/")[0]];
    var gslug = c.path.split("/")[1];
    view.innerHTML =
      trail([
        { label: "Writing", href: "#/" },
        { label: c.lang, href: "#/" + L.slug },
        { label: c.genre, href: "#/" + L.slug + "/" + gslug },
        { label: c.theme }
      ]) +
      '<div class="coll-head"><div class="kicker">' + esc(c.lang) + " · " + esc(c.genre) + "</div>" +
      "<h2 style='font-size:2.1rem;font-weight:600;color:var(--ink)'>" + esc(c.theme) + "</h2>" +
      '<div class="byline">' + (af ? "Gedigte deur " : "Poems by ") + esc(AUTHOR) + "</div></div>" +
      '<ul class="toc coll-toc">' + items + "</ul>";
    window.scrollTo(0, 0);
  }

  function route() {
    var h = (location.hash || "").replace(/^#\/?/, "");
    var parts = h.split("/").filter(Boolean);
    if (!parts.length) return showLanguages();
    var L = langBySlug[parts[0]];
    if (!L) return showLanguages();
    if (parts.length === 1) return showGenres(L);
    var G = genreOf(L, parts[1]);
    if (!G) return showGenres(L);
    if (parts.length === 2) return showShelf(L, G);
    var c = collByPath[parts.join("/")];
    if (c) return showCollection(c);
    return showShelf(L, G);
  }

  window.addEventListener("hashchange", route);
  route();
})();
</script>
<script data-goatcounter="https://attieretief.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
